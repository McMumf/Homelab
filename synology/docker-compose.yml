version: '3'

networks:
  npm-internal:
  npm-nw:
    # npm-nw is an external network, need to manually make it
    external: true

services:
  # cloudfare-ddns:
  #   image: 'oznu/cloudfare-ddns:latest'
  #   environment:
  #     - API_KEY=${CLOUDFARE_API_KEY}
  #     - PROXIED=true
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./nginx-proxy-manager/data:/data
      - ./nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    healthcheck:
      test: [ "CMD", "/bin/check-health" ]
      interval: 10s
      timeout: 3s
